<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fervent – Reflection Journal</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f9f5ff; font-family: Georgia, serif; }
    #root { max-width: 480px; margin: 0 auto; min-height: 100vh; padding-bottom: 40px; }
    button { font-family: Georgia, serif; cursor: pointer; }
    textarea, input { font-family: Georgia, serif; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const CHAPTERS = [
  { id:1, title:"Prayer Is War", focus:"The Enemy", prompts:["What areas of your life feel most under attack right now?","How have you been treating prayer — as a weapon or an afterthought?","What would change if you approached prayer as an act of war?"] },
  { id:2, title:"Know Your Enemy", focus:"Spiritual Warfare", prompts:["What lies have you been believing about yourself or your situation?","How have discouragement or distraction shown up as spiritual attacks?","Write the truth that counters each lie you identified."] },
  { id:3, title:"Sealed with Prayer", focus:"Your Focus", prompts:["What consumes most of your mental energy right now?","How is the enemy using distraction to keep you from God?","What would a focused, prayerful mind look like in your daily routine?"] },
  { id:4, title:"The Fervency Factor", focus:"Your Identity", prompts:["How has the enemy attacked your sense of identity or worth lately?","Write 5 truths about who God says you are.","How does knowing your identity change how you approach God in prayer?"] },
  { id:5, title:"Winning the War Within", focus:"Your Family", prompts:["What battles are your loved ones facing that you haven't been covering in prayer?","How is the enemy targeting your family relationships?","What does it look like for you to be a prayer covering for your household?"] },
  { id:6, title:"Making the Ask", focus:"Your Past", prompts:["What from your past is the enemy still using against you?","Is there anything — a wound, a mistake, a person — you haven't fully released to God?","Write a prayer of surrender over the thing that has held you longest."] },
  { id:7, title:"The Grind", focus:"Your Fears", prompts:["Name your top fears honestly. Don't minimize them.","How have these fears limited your obedience or your prayer life?","What Scripture speaks directly against each fear you named?"] },
  { id:8, title:"A Passionate Appeal", focus:"Your Purity", prompts:["Are there areas where you've allowed compromise you haven't brought to God?","How does unconfessed sin affect the intimacy of your prayer life?","Write a prayer of honest confession and receive God's forgiveness fully."] },
  { id:9, title:"Your Calling", focus:"Your Purpose", prompts:["What has God uniquely gifted and positioned you to do?","Where has confusion about purpose felt like a spiritual attack?","What is one step toward your calling you've been avoiding?"] },
  { id:10, title:"The Privilege of Prayer", focus:"Your Relationships", prompts:["Which relationship in your life needs the most prayer covering right now?","How has offense, bitterness, or conflict become a foothold for the enemy?","What would it look like to let love be your strategy in that relationship?"] },
  { id:11, title:"Praying for Others", focus:"Others", prompts:["Who in your life is the enemy targeting that needs your intercession?","How does praying for others strengthen your own faith?","Write the names of 5 people you will commit to pray for fervently."] },
  { id:12, title:"A Warrior's Manifesto", focus:"Your Faith", prompts:["How has this study changed the way you see prayer?","What is the most significant thing God spoke to you through Fervent?","Write your personal Warrior's Manifesto — your declaration going forward."] },
];

const COLORS = ["#7C3AED","#6D28D9","#8B5CF6","#9333EA","#7C3AED","#6D28D9","#8B5CF6","#9333EA","#7C3AED","#6D28D9","#8B5CF6","#9333EA"];
const STORE_KEY = "fervent-journal-v1";

const fmt = (iso) => new Date(iso).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric",hour:"numeric",minute:"2-digit"});
const wc = (t) => t.trim() ? t.trim().split(/\s+/).length : 0;
const eKey = (chId, pIdx) => `ch${chId}:${pIdx===null?"free":`p${pIdx}`}`;

const load = () => { try { const r = localStorage.getItem(STORE_KEY); return r ? JSON.parse(r) : {}; } catch { return {}; } };
const persist = (d) => { try { localStorage.setItem(STORE_KEY, JSON.stringify(d)); } catch {} };

function App() {
  const [all, setAll] = useState(load);
  const [view, setView] = useState("list"); // list | chapter | write | history | read
  const [selected, setSelected] = useState(null);
  const [activePrompt, setActivePrompt] = useState(null);
  const [draft, setDraft] = useState("");
  const [savedMsg, setSavedMsg] = useState(false);
  const [readEntry, setReadEntry] = useState(null);

  const ch = CHAPTERS.find(c => c.id === selected);
  const upd = (u) => { setAll(u); persist(u); };
  const getEntries = (chId, pIdx) => all[eKey(chId, pIdx)] || [];

  const handleSave = () => {
    if (!draft.trim()) return;
    const k = eKey(selected, activePrompt);
    const entry = { id: Date.now(), date: new Date().toISOString(), text: draft.trim() };
    const updated = { ...all, [k]: [entry, ...(all[k]||[])] };
    upd(updated);
    setSavedMsg(true);
    setTimeout(() => setSavedMsg(false), 2500);
    setDraft("");
  };

  const handleDelete = (chId, pIdx, id) => {
    const k = eKey(chId, pIdx);
    upd({ ...all, [k]: (all[k]||[]).filter(e => e.id !== id) });
  };

  const chCount = (chId) => {
    const c = CHAPTERS.find(x => x.id === chId);
    if (!c) return 0;
    return c.prompts.reduce((s,_,i) => s + getEntries(chId,i).length, 0) + getEntries(chId,null).length;
  };

  const totalEntries = CHAPTERS.reduce((s,c) => s + chCount(c.id), 0);

  const goBack = () => {
    if (view==="write"||view==="history") setView("chapter");
    else if (view==="read") setView("history");
    else if (view==="chapter") setView("list");
  };

  return (
    <div>
      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#6D28D9,#9333EA)",padding:"24px 16px 18px",color:"white",textAlign:"center",position:"relative"}}>
        {view==="list" ? (
          <a href="index.html" style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",background:"rgba(255,255,255,0.2)",borderRadius:8,padding:"5px 12px",fontSize:12,color:"white",textDecoration:"none"}}>🏠</a>
        ) : (
          <button onClick={goBack} style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",background:"rgba(255,255,255,0.2)",border:"none",color:"white",borderRadius:8,padding:"5px 12px",fontSize:12}}>← Back</button>
        )}
        <div style={{fontSize:10,letterSpacing:3,opacity:0.75,textTransform:"uppercase"}}>Priscilla Shirer</div>
        <div style={{fontSize:24,fontWeight:"bold",letterSpacing:1}}>FERVENT</div>
        <div style={{fontSize:11,opacity:0.7,marginTop:1}}>✍️ Reflection Journal</div>
        {view==="list" && <div style={{fontSize:12,opacity:0.8,marginTop:5}}>{totalEntries} {totalEntries===1?"entry":"entries"} saved</div>}
      </div>

      <div style={{padding:16}}>

        {/* LIST */}
        {view==="list" && <>
          <div style={{background:"white",borderRadius:12,padding:14,marginBottom:14,boxShadow:"0 1px 4px rgba(0,0,0,0.07)"}}>
            <div style={{fontWeight:"bold",color:"#6D28D9",marginBottom:4}}>Your Journal</div>
            <div style={{fontSize:12,color:"#666",lineHeight:1.7}}>Each chapter has 3 guided prompts and a free-write space. Every saved entry is dated and kept in your history.</div>
          </div>
          {CHAPTERS.map((c,i) => {
            const count = chCount(c.id);
            return (
              <div key={c.id} onClick={()=>{setSelected(c.id);setView("chapter");}}
                style={{background:"white",borderRadius:12,padding:"12px 14px",marginBottom:8,display:"flex",alignItems:"center",gap:12,cursor:"pointer",boxShadow:"0 1px 4px rgba(0,0,0,0.06)",border:count>0?"2px solid #a78bfa":"2px solid transparent"}}>
                <div style={{background:COLORS[i],color:"white",borderRadius:8,width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:"bold",flexShrink:0}}>{c.id}</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:"bold",fontSize:13}}>{c.title}</div>
                  <div style={{fontSize:11,color:"#999"}}>Focus: {c.focus}</div>
                </div>
                <div style={{fontSize:11,color:count>0?"#9333EA":"#ccc"}}>{count>0?`${count} ${count===1?"entry":"entries"}`:"No entries"}</div>
              </div>
            );
          })}
        </>}

        {/* CHAPTER */}
        {view==="chapter" && ch && <>
          <div style={{background:`linear-gradient(135deg,${COLORS[ch.id-1]},#9333EA)`,borderRadius:12,padding:14,color:"white",marginBottom:14}}>
            <div style={{fontSize:11,opacity:0.75}}>Chapter {ch.id} · {ch.focus}</div>
            <div style={{fontSize:18,fontWeight:"bold",margin:"3px 0"}}>{ch.title}</div>
          </div>
          {ch.prompts.map((prompt,i) => {
            const entries = getEntries(ch.id, i);
            return (
              <div key={i} style={{background:"white",borderRadius:12,padding:14,marginBottom:10,boxShadow:"0 1px 4px rgba(0,0,0,0.07)",border:entries.length>0?"2px solid #a78bfa":"2px solid transparent"}}>
                <div style={{fontSize:10,color:"#9333EA",fontWeight:"bold",letterSpacing:1,marginBottom:4}}>PROMPT {i+1}</div>
                <div style={{fontSize:13,color:"#333",lineHeight:1.7,marginBottom:10}}>{prompt}</div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>{setActivePrompt(i);setDraft("");setView("write");}}
                    style={{flex:1,padding:"8px 0",borderRadius:8,border:"none",background:"#6D28D9",color:"white",fontSize:12}}>+ New Entry</button>
                  {entries.length>0 && (
                    <button onClick={()=>{setActivePrompt(i);setView("history");}}
                      style={{flex:1,padding:"8px 0",borderRadius:8,border:"1px solid #a78bfa",background:"white",color:"#6D28D9",fontSize:12}}>History ({entries.length})</button>
                  )}
                </div>
              </div>
            );
          })}
          {/* Free write */}
          {(()=>{
            const entries = getEntries(ch.id, null);
            return (
              <div style={{background:"white",borderRadius:12,padding:14,boxShadow:"0 1px 4px rgba(0,0,0,0.07)",border:entries.length>0?"2px solid #a78bfa":"2px dashed #ddd"}}>
                <div style={{fontSize:10,color:"#9333EA",fontWeight:"bold",letterSpacing:1,marginBottom:4}}>FREE WRITE</div>
                <div style={{fontSize:13,color:"#666",marginBottom:10}}>Write freely — no prompt, just you and God.</div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>{setActivePrompt(null);setDraft("");setView("write");}}
                    style={{flex:1,padding:"8px 0",borderRadius:8,border:"none",background:"#6D28D9",color:"white",fontSize:12}}>+ New Entry</button>
                  {entries.length>0 && (
                    <button onClick={()=>{setActivePrompt(null);setView("history");}}
                      style={{flex:1,padding:"8px 0",borderRadius:8,border:"1px solid #a78bfa",background:"white",color:"#6D28D9",fontSize:12}}>History ({entries.length})</button>
                  )}
                </div>
              </div>
            );
          })()}
        </>}

        {/* WRITE */}
        {view==="write" && ch && <>
          <div style={{background:"white",borderRadius:12,padding:14,marginBottom:12,boxShadow:"0 1px 4px rgba(0,0,0,0.07)"}}>
            {activePrompt!==null ? (
              <>
                <div style={{fontSize:10,color:"#9333EA",fontWeight:"bold",letterSpacing:1,marginBottom:6}}>PROMPT {activePrompt+1}</div>
                <div style={{fontSize:13,color:"#444",fontStyle:"italic",lineHeight:1.75,marginBottom:12,paddingBottom:12,borderBottom:"1px solid #f0e8ff"}}>{ch.prompts[activePrompt]}</div>
              </>
            ) : (
              <div style={{fontSize:13,color:"#9333EA",fontWeight:"bold",marginBottom:10}}>Free Write · Ch. {ch.id}: {ch.title}</div>
            )}
            <textarea autoFocus value={draft} onChange={e=>setDraft(e.target.value)}
              placeholder="Begin writing here..."
              style={{width:"100%",minHeight:300,border:"none",outline:"none",fontSize:14,color:"#333",lineHeight:1.85,resize:"none",boxSizing:"border-box",background:"transparent"}}/>
            <div style={{fontSize:11,color:"#bbb",textAlign:"right"}}>{wc(draft)} words</div>
          </div>
          <button onClick={handleSave} disabled={!draft.trim()}
            style={{width:"100%",padding:14,borderRadius:12,border:"none",background:draft.trim()?"linear-gradient(135deg,#6D28D9,#9333EA)":"#e0d4ff",color:"white",fontSize:14,fontWeight:"bold"}}>
            {savedMsg?"✓ Saved!":"Save Entry"}
          </button>
          {savedMsg && <div style={{textAlign:"center",fontSize:12,color:"#6D28D9",marginTop:8}}>Entry saved ✓ Tap Back to see your history.</div>}
        </>}

        {/* HISTORY */}
        {view==="history" && ch && <>
          <div style={{fontWeight:"bold",color:"#6D28D9",marginBottom:4,fontSize:15}}>
            {activePrompt!==null?`Prompt ${activePrompt+1} History`:"Free Write History"}
          </div>
          <div style={{fontSize:12,color:"#888",marginBottom:14}}>Ch. {ch.id} · {ch.title}</div>
          {getEntries(ch.id,activePrompt).length===0
            ? <div style={{textAlign:"center",color:"#bbb",fontSize:13,marginTop:40}}>No entries yet.</div>
            : getEntries(ch.id,activePrompt).map(entry=>(
              <div key={entry.id} style={{background:"white",borderRadius:12,padding:14,marginBottom:10,boxShadow:"0 1px 4px rgba(0,0,0,0.07)"}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                  <div style={{fontSize:11,color:"#9333EA"}}>{fmt(entry.date)}</div>
                  <div style={{fontSize:11,color:"#bbb"}}>{wc(entry.text)} words</div>
                </div>
                <div style={{fontSize:13,color:"#444",lineHeight:1.75,marginBottom:10}}>
                  {entry.text.length>180?entry.text.slice(0,180)+"…":entry.text}
                </div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>{setReadEntry(entry);setView("read");}}
                    style={{flex:1,padding:"7px 0",borderRadius:8,border:"none",background:"#6D28D9",color:"white",fontSize:12}}>Read Full</button>
                  <button onClick={()=>handleDelete(ch.id,activePrompt,entry.id)}
                    style={{padding:"7px 14px",borderRadius:8,border:"1px solid #fecaca",background:"white",color:"#ef4444",fontSize:12}}>Delete</button>
                </div>
              </div>
            ))
          }
        </>}

        {/* READ */}
        {view==="read" && readEntry && (
          <div style={{background:"white",borderRadius:12,padding:16,boxShadow:"0 1px 4px rgba(0,0,0,0.07)"}}>
            <div style={{fontSize:11,color:"#9333EA",marginBottom:12}}>{fmt(readEntry.date)}</div>
            <div style={{fontSize:14,color:"#333",lineHeight:1.9,whiteSpace:"pre-wrap"}}>{readEntry.text}</div>
            <div style={{fontSize:11,color:"#bbb",textAlign:"right",marginTop:12}}>{wc(readEntry.text)} words</div>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
